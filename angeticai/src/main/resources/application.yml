server:
  port: 8085
  servlet:
    context-path: /angeticai

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

ollama:
  base-url: http://localhost:11434
  model: gemma3:12b
  # Embedding model used for vector indexing — run: ollama pull nomic-embed-text
  embedding-model: nomic-embed-text
  timeout: 120

local:
  spreadsheets:
    # Folder containing your downloaded Google Sheet files (.xlsx and/or .csv)
    folder: C:/google_sheets

pdf:
  documents:
    # Folder containing your PDF documents to search
    folder: C:/hemant/personal/documents

